name: Daily Water Usage

on:
  schedule:
    - cron: '0 14 * * *'  # Runs daily at 9am ET (14:00 UTC)
  workflow_dispatch:        # Allows manual trigger from GitHub UI

jobs:
  fetch-usage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync
          uv run playwright install chromium
          uv run playwright install-deps chromium

      - name: Run script
        env:
          DEP_USERNAME: ${{ secrets.DEP_USERNAME }}
          DEP_PASSWORD: ${{ secrets.DEP_PASSWORD }}
          DEP_ACCOUNT_ID: ${{ secrets.DEP_ACCOUNT_ID }}
          DEP_SERVICE_ID: ${{ secrets.DEP_SERVICE_ID }}
          DEP_METER_ID: ${{ secrets.DEP_METER_ID }}
          DEP_REGISTER_ID: ${{ secrets.DEP_REGISTER_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: uv run python dep_water_usage.py
